<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Créez votre compte EcoTroc gratuit avec votre adresse @efrei.net pour échanger des objets entre étudiants.">
  <title>Inscription — EcoTroc</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="/index.html" class="logo"><span class="logo-icon">♻</span>EcoTroc</a>
    <nav><ul class="nav-links">
      <li><a href="/index.html">Accueil</a></li>
      <li><a href="/login.html">Connexion</a></li>
      <li><a href="/register.html" class="actif">Inscription</a></li>
      <li><button class="nav-btn" id="btn-dark">🌙</button></li>
    </ul></nav>
  </div>
</header>
<main class="page-form">
  <div class="form-card">
    <h1>Rejoindre EcoTroc 🌱</h1>
    <p class="sous-titre">Créez votre compte pour donner et récupérer des objets gratuitement.</p>
    <div class="alerte alerte-erreur" id="msg-erreur" role="alert"></div>
    <div class="alerte alerte-succes" id="msg-succes" role="status"></div>
    <div class="form-groupe">
      <label for="nom">Nom complet</label>
      <input type="text" id="nom" placeholder="Marie Dupont" required autocomplete="name">
    </div>
    <div class="form-groupe">
      <label for="email">E-mail académique</label>
      <input type="email" id="email" placeholder="prenom.nom@efrei.net" required autocomplete="email">
      <span class="aide-champ">Réservé aux e-mails @efrei.net</span>
    </div>
    <div class="form-groupe">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="14 caractères minimum" required autocomplete="new-password">
    </div>
    <div class="form-groupe">
      <label for="password2">Confirmer le mot de passe</label>
      <input type="password" id="password2" placeholder="Répétez votre mot de passe" required autocomplete="new-password">
    </div>
    <button class="btn btn-primaire btn-full" id="btn-register">Créer mon compte</button>
    <p class="lien-form">Déjà inscrit·e ? <a href="/login.html">Se connecter</a></p>
  </div>
</main>
<footer>
  <div class="container footer-inner">
    <span>© 2025 EcoTroc Étudiant — EFREI Paris</span>
    <span class="badge-green">🌱 Données : strict minimum (RGPD)</span>
  </div>
</footer>
<script src="/script.js" defer></script>
<script>
  document.getElementById('btn-register').addEventListener('click',async()=>{
    const nom=document.getElementById('nom').value.trim();
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const password2=document.getElementById('password2').value;
    const msgErr=document.getElementById('msg-erreur');
    const msgOk=document.getElementById('msg-succes');
    msgErr.classList.remove('visible');msgOk.classList.remove('visible');
    if(!nom||!email||!password||!password2){msgErr.textContent='Veuillez remplir tous les champs.';return msgErr.classList.add('visible');}
    if(!email.endsWith('@efrei.net')){
      msgErr.textContent='Utilisez votre adresse @efrei.net.';
      document.getElementById('email').classList.add('invalide');
      return msgErr.classList.add('visible');
    }
    if(password.length<14){msgErr.textContent='Le mot de passe doit contenir au moins 14 caractères.';return msgErr.classList.add('visible');}
    if(password!==password2){msgErr.textContent='Les mots de passe ne correspondent pas.';return msgErr.classList.add('visible');}
    const btn=document.getElementById('btn-register');
    btn.textContent='Création…';btn.disabled=true;
    try{
      const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nom,email,password})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.message);
      msgOk.textContent='✓ Compte créé ! Bienvenue sur EcoTroc…';
      msgOk.classList.add('visible');
      setTimeout(()=>window.location.href='/index.html',1200);
    }catch(err){
      msgErr.textContent=err.message;msgErr.classList.add('visible');
      btn.textContent='Créer mon compte';btn.disabled=false;
    }
  });
</script>
</body>
</html>
