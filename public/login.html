<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="Connectez-vous à EcoTroc pour donner ou récupérer des objets entre étudiants EFREI.">
  <title>Connexion — EcoTroc</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <a href="/index.html" class="logo"><span class="logo-icon">♻</span>EcoTroc</a>
    <nav><ul class="nav-links">
      <li><a href="/index.html">Accueil</a></li>
      <li><a href="/login.html" class="actif">Connexion</a></li>
      <li><a href="/register.html">Inscription</a></li>
      <li><button class="nav-btn" id="btn-dark" title="Basculer mode sombre" aria-label="Mode sombre">🌙</button></li>
    </ul></nav>
  </div>
</header>
<main class="page-form">
  <div class="form-card">
    <h1>Bon retour ! 👋</h1>
    <p class="sous-titre">Connectez-vous pour donner ou récupérer des objets.</p>
    <div class="alerte alerte-erreur" id="msg-erreur" role="alert"></div>
    <div class="form-groupe">
      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" placeholder="prenom.nom@efrei.net" required autocomplete="email">
    </div>
    <div class="form-groupe">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••••••••" required autocomplete="current-password">
    </div>
    <button class="btn btn-primaire btn-full" id="btn-login">Se connecter</button>
    <p class="lien-form">Pas encore de compte ? <a href="/register.html">Créer un compte gratuitement</a></p>
  </div>
</main>
<footer>
  <div class="container footer-inner">
    <span>© 2025 EcoTroc Étudiant — EFREI Paris</span>
    <span class="badge-green">🌱 0 bibliothèque externe</span>
  </div>
</footer>
<script src="/script.js" defer></script>
<script>
  document.getElementById('btn-login').addEventListener('click', async()=>{
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const msgErr=document.getElementById('msg-erreur');
    msgErr.classList.remove('visible');
    if(!email||!password){msgErr.textContent='Veuillez remplir tous les champs.';return msgErr.classList.add('visible');}
    const btn=document.getElementById('btn-login');
    btn.textContent='Connexion…';btn.disabled=true;
    try{
      const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(!res.ok)throw new Error(data.message);
      window.location.href='/index.html';
    }catch(err){
      msgErr.textContent=err.message;msgErr.classList.add('visible');
      btn.textContent='Se connecter';btn.disabled=false;
    }
  });
  document.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
</script>
</body>
</html>
